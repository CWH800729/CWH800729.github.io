<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片表格製作系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- 添加 SheetJS 庫 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --base-font-size: 16px;
            --h1-size: 2rem;
            --h3-size: 1.5rem;
            --button-font-size: 1rem;
            --input-font-size: 1rem;
            --cell-text-size: 0.9rem;
        }

        @media screen and (max-width: 768px) {
            :root {
                --base-font-size: 14px;
                --h1-size: 1.75rem;
                --h3-size: 1.25rem;
                --button-font-size: 0.9rem;
                --input-font-size: 0.9rem;
                --cell-text-size: 0.8rem;
            }

            .container {
                padding: 10px;
            }

            .photo-cell {
                width: 150px;
                height: 150px;
            }

            .custom-field {
                flex-wrap: wrap;
                gap: 5px;
            }

            .custom-field .field-type {
                width: 100%;
                margin-top: 5px;
            }

            .custom-field input[type="text"] {
                flex: 1;
                min-width: 100px;
            }
        }

        @media screen and (max-width: 480px) {
            :root {
                --base-font-size: 12px;
                --h1-size: 1.5rem;
                --h3-size: 1.1rem;
                --button-font-size: 0.8rem;
                --input-font-size: 0.8rem;
                --cell-text-size: 0.7rem;
            }

            .photo-cell {
                width: 120px;
                height: 120px;
            }

            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }

            .header-left {
                flex-direction: column;
                width: 100%;
            }

            .site-author {
                white-space: normal;
                width: 100%;
            }

            .logo {
                width: 50px;
                height: 50px;
            }

            .control-panel {
                display: flex;
                flex-wrap: wrap;
                gap: 5px;
            }

            .btn, .batch-upload-btn {
                flex: 1;
                min-width: 120px;
                margin: 2px;
                padding: 6px 10px;
            }

            .export-options select {
                width: 100%;
                margin: 5px 0;
            }
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
            font-size: var(--base-font-size);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            min-width: 0;
        }

        .site-author {
            margin: 0;
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            color: #5a6c7d;
            white-space: nowrap;
        }

        .logo {
            width: 75px;
            height: 75px;
            border-radius: 16px;
        }

        .site-title {
            margin: 0;
            font-size: var(--h1-size);
            color: #2c3e50;
        }

        .main-content {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .control-panel {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        /* 左側暫存懸浮面板 */
        .draft-float-panel {
            position: fixed;
            left: max(12px, env(safe-area-inset-left));
            top: 50%;
            transform: translateY(-50%);
            z-index: 9998;
            font-size: 0.95rem;
        }
        .draft-float-panel-inner {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
            padding: 14px 12px;
            width: 168px;
            box-sizing: border-box;
        }
        .draft-float-title {
            font-weight: bold;
            color: #2c3e50;
            margin: 0 0 10px 0;
            font-size: 0.95em;
            text-align: center;
        }
        .draft-float-panel .draft-float-btn {
            width: 100%;
            margin: 0 0 8px 0;
            padding: 10px 8px;
            font-size: 0.9em;
            box-sizing: border-box;
        }
        .draft-float-hint {
            margin: 0;
            font-size: 0.72em;
            color: #868e96;
            line-height: 1.35;
        }
        .draft-float-panel .draft-status {
            display: block;
            margin-top: 8px;
            font-size: 0.72em;
            color: #6c757d;
            line-height: 1.35;
            word-break: break-word;
        }
        @media screen and (max-width: 768px) {
            .draft-float-panel {
                top: auto;
                bottom: max(12px, env(safe-area-inset-bottom));
                transform: none;
            }
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        .photo-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .photo-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            vertical-align: middle;
        }

        .photo-cell {
            width: 200px;
            height: 200px;
            position: relative;
            background: #f8f9fa;
            border: 2px dashed #ddd;
            transition: all 0.3s ease;
        }

        .photo-cell.drag-over {
            background: #e3f2fd;
            border-color: #3498db;
            border-style: solid;
        }

        /* 螢幕預覽圖改由 .photo-thumb-wrap 內的縮圖／預覽負責 */

        .photo-cell .upload-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            color: #666;
            text-align: center;
        }

        .photo-cell .upload-btn .drag-text {
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .photo-cell .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            cursor: pointer;
            color: #e74c3c;
            display: none;
            z-index: 2;
            background: rgba(255,255,255,0.7);
            border-radius: 50%;
            padding: 2px 6px;
        }

        .photo-cell:hover .remove-btn {
            display: block;
        }

        .custom-fields {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .available-fields {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .available-fields h4 {
            margin: 0 0 10px 0;
            font-size: var(--h3-size);
            color: #2c3e50;
        }

        .field-checkboxes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .field-checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .field-checkbox-item:hover {
            background: #e9ecef;
        }

        .field-checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        .field-checkbox-item label {
            font-size: 1.08em;
            padding-left: 2px;
        }

        @media screen and (max-width: 768px) {
            .field-checkboxes {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }

        @media screen and (max-width: 480px) {
            .field-checkboxes {
                grid-template-columns: 1fr;
            }
        }

        .custom-field {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
            background: white;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
            cursor: move;
            transition: all 0.3s ease;
            font-size: 1.15em;
        }

        .custom-field.dragging {
            opacity: 0.5;
            background: #f8f9fa;
            border: 2px dashed #3498db;
        }

        .custom-field .drag-handle {
            color: #95a5a6;
            cursor: move;
            padding: 5px;
        }

        .custom-field .drag-handle:hover {
            color: #2c3e50;
        }

        .custom-field input[readonly] {
            background-color: #f8f9fa;
            cursor: not-allowed;
        }

        .custom-field .field-buttons {
            display: flex;
            gap: 5px;
        }

        .custom-field .field-buttons button {
            padding: 5px 10px;
            font-size: 0.9em;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .custom-field .field-buttons button:hover {
            background: #c0392b;
        }

        .custom-field .field-type {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .custom-field .field-type select {
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .custom-field .field-type label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .custom-field .field-type input[type="checkbox"] {
            margin: 0;
        }

        .custom-field input[type="text"] {
            font-size: 1.15em;
            padding: 6px 10px;
        }

        .custom-field button {
            font-size: 1.1em;
        }

        .batch-upload-btn {
            display: inline-block;
            padding: 8px 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            font-size: var(--button-font-size);
        }

        .batch-upload-btn:hover {
            background: #2980b9;
        }

        .batch-upload-btn input[type="file"] {
            display: none;
        }

        .add-field-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .file-input {
            display: none;
        }

        .export-options {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .export-options select {
            padding: 8px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        /* 調整表格在手機上的顯示 */
        @media screen and (max-width: 480px) {
            .photo-table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }

            .photo-table td {
                padding: 5px;
            }

            .custom-field {
                padding: 8px;
            }

            .custom-field .drag-handle {
                padding: 3px;
            }

            .custom-field .field-buttons button {
                padding: 3px 6px;
                font-size: var(--button-font-size);
            }
        }

        /* 確保按鈕在觸控裝置上容易點擊 */
        @media (hover: none) {
            .btn, .batch-upload-btn, .add-field-btn,
            .custom-field .field-buttons button {
                min-height: 44px;
                min-width: 44px;
            }

            .custom-field input[type="checkbox"] {
                width: 20px;
                height: 20px;
            }
        }

        .title-settings-section {
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .title-settings-section h3.title-settings-heading {
            margin: 0 0 14px 0;
            font-size: var(--h3-size);
            color: #2c3e50;
        }
        .preview-custom-titles {
            margin-bottom: 0;
            text-align: left;
            max-width: 520px;
        }
        .preview-custom-titles input {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: left;
            font-family: inherit;
        }
        .preview-custom-titles input.title-main {
            font-size: 1.25em;
        }
        .preview-custom-titles input.title-sub {
            font-size: 1.05em;
        }
        .preview-custom-titles .title-options {
            margin: 6px 0 0 0;
            text-align: left;
        }
        .preview-custom-titles .title-checkbox {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 1em;
            color: #2c3e50;
        }
        .preview-custom-titles .title-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
        }
        .preview-custom-titles .title-checkbox span {
            font-weight: 500;
        }
        .preview-custom-titles .print-title {
            display: none;
        }
        @media print {
            .preview-custom-titles .print-title {
                display: block;
                text-align: center;
                margin-bottom: 20px;
            }
            .preview-custom-titles .print-title .title-main {
                font-size: 1.5em;
                margin-bottom: 10px;
            }
            .preview-custom-titles .print-title .title-sub {
                font-size: 1.25em;
            }
            .preview-custom-titles input {
                display: none;
            }
        }
        @media screen and (max-width: 480px) {
            .title-settings-section {
                padding: 14px;
            }
        }
        .column-selector {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-right: 16px;
        }
        .column-selector label {
            font-size: 1em;
        }
        .column-selector input[type="number"] {
            width: 60px;
            padding: 4px 8px;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .photo-cell-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
        }
        /* 儲存格內縮圖 + 滑鼠懸停顯示約 2.5 倍大預覽（同一 wrap 內可移入預覽圖不會閃爍） */
        @media screen {
            .photo-thumb-wrap {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                max-width: 100%;
                width: 100%;
                margin-bottom: 8px;
                z-index: 1;
            }
            .photo-cell:hover .photo-thumb-wrap,
            .photo-thumb-wrap:hover {
                z-index: 40;
            }
            .photo-thumb-wrap .photo-thumb {
                display: block;
                max-height: 120px;
                max-width: 100%;
                width: auto;
                height: auto;
                object-fit: contain;
                cursor: zoom-in;
            }
            .photo-thumb-wrap .photo-thumb-preview {
                display: none;
                position: absolute;
                left: 50%;
                top: 100%;
                margin-top: 6px;
                /* 版面與縮圖相同，再以 2.5 倍顯示（非完整原圖尺寸） */
                max-height: 120px;
                max-width: 100%;
                width: auto;
                height: auto;
                object-fit: contain;
                transform: translate(-50%, 0) scale(2.5);
                transform-origin: center top;
                background: #fff;
                padding: 4px;
                border-radius: 6px;
                box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
                border: 1px solid rgba(0, 0, 0, 0.08);
                cursor: zoom-out;
                pointer-events: auto;
            }
            .photo-thumb-wrap:hover .photo-thumb-preview {
                display: block;
            }
        }
        .photo-cell-fields {
            width: 100%;
            margin-top: 4px;
            border: 1px solid #bbb;
            border-radius: 4px;
            background: #fafbfc;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .photo-cell-field-row {
            display: flex;
            flex-direction: row;
            border-bottom: 1px solid #e0e0e0;
            min-height: 28px;
        }
        .photo-cell-field-label {
            width: 80px;
            background: #f5f6fa;
            color: #222;
            font-weight: bold;
            padding: 4px 8px;
            border-right: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 1.15em;
        }
        .photo-cell-field-value {
            flex: 1;
            background: #fff;
            color: #222;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            font-size: 1.15em;
        }
        .filename-mapping-config {
            margin-bottom: 16px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            display: none;
        }
        .filename-mapping-config label {
            font-size: 1.1em;
            font-weight: bold;
            white-space: nowrap;
        }
        .filename-mapping-config .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .filename-mapping-config input[type="text"] {
            font-size: 1.1em;
            padding: 6px 10px;
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .filename-mapping-config input[type="text"]:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }
        .filename-mapping-config .lock-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }
        .filename-mapping-config .lock-btn.locked {
            background-color: #e74c3c;
            color: white;
        }
        .filename-mapping-config .lock-btn.unlocked {
            background-color: #2ecc71;
            color: white;
        }
        .filename-mapping-config .lock-btn:hover {
            opacity: 0.9;
        }
        .filename-mapping-config .lock-btn i {
            font-size: 1.1em;
        }
        .filename-mapping-config .mapping-note {
            flex-basis: 100%;
            margin: 2px 0 0;
            color: #8f98a3;
            font-size: 0.88em;
            line-height: 1.35;
        }

        /* 列印樣式 */
        @media print {
            @page {
                size: A4;
                margin: 1cm;
            }
            /*
             * 勿用 visibility:hidden 隱藏整頁：隱藏元素仍佔版面高度，列印會依「整份網頁高度」多出空白頁。
             * 改為只顯示 body 下動態插入的 .print-content，其餘 display:none 不佔高度。
             */
            html, body {
                height: auto !important;
                min-height: 0 !important;
                margin: 0;
                padding: 0;
            }
            body > *:not(.print-content) {
                display: none !important;
            }
            .print-content {
                display: block !important;
                position: relative !important;
                left: auto !important;
                top: auto !important;
                width: 100%;
                max-width: 100%;
                box-sizing: border-box;
                overflow-x: hidden;
            }
            .print-content * {
                box-sizing: border-box;
            }
            .preview-custom-titles {
                max-width: 100%;
                overflow: hidden;
            }
            .print-page {
                display: flex;
                flex-wrap: wrap;
                align-content: flex-start;
                gap: 10mm;
                width: 100%;
                max-width: 100%;
                box-sizing: border-box;
            }
            /* 只在「還有下一頁內容」時分頁，避免最後一頁後多一張空白 */
            .print-page:not(:last-child) {
                page-break-after: always;
                break-after: page;
            }
            /* 寬度由 printTable() 依「欄×列」以 inline style 覆寫（預設 2 欄與 gap 10mm 一致） */
            .print-photo-cell {
                page-break-inside: avoid;
                break-inside: avoid;
                display: flex;
                flex-direction: column;
                margin-bottom: 0;
                overflow: hidden;
                min-width: 0;
                max-width: calc(50% - 5mm);
                flex: 1 1 calc(50% - 5mm);
            }
            .print-photo-cell img {
                width: 100%;
                max-width: 100%;
                max-height: 60%; /* 限制圖片最大高度為60% */
                object-fit: contain;
                margin-bottom: 5px;
                flex-shrink: 1; /* 允許圖片縮小 */
            }
            .print-photo-fields {
                width: 100%;
                max-width: 100%;
                border: 1px solid #000;
                flex-shrink: 0; /* 欄位區塊不縮小 */
                min-height: 40px; /* 確保欄位有最小高度 */
                overflow: hidden;
            }
            .print-field-row {
                display: flex;
                border-bottom: 1px solid #000;
                min-height: 18px; /* 稍微縮小行高 */
                min-width: 0;
                max-width: 100%;
            }
            .print-field-row:last-child {
                border-bottom: none; /* 最後一行不加底線 */
            }
            .print-field-label {
                width: 72px;
                min-width: 72px;
                flex-shrink: 0;
                padding: 2px 4px;
                border-right: 1px solid #000;
                font-weight: bold;
                font-size: 8pt; /* 稍微縮小字體 */
            }
            .print-field-value {
                flex: 1;
                min-width: 0;
                padding: 2px 4px;
                font-size: 8pt;
                overflow-wrap: anywhere;
                word-break: break-word;
            }
            .no-print {
                display: none !important;
            }
        }
        .photo-cell-field-value[readonly] {
            border: 1px solid #d0d0d0 !important;
            background: #f8f8f8 !important;
            color: #888 !important;
            border-radius: 6px !important;
            box-shadow: none !important;
        }
        .has-tooltip {
            position: relative;
            cursor: help;
        }
        .has-tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            background: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            white-space: pre-line;
            font-size: 0.98em;
            z-index: 100;
            min-width: 220px;
            max-width: 320px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
            margin-left: 12px;
            pointer-events: none;
        }

        /* 圖片點擊樣式 */
        .clickable-image {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .clickable-image:hover {
            transform: scale(1.05);
        }

        .clickable-image:active {
            transform: scale(0.95);
        }

        .click-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .click-count.show {
            opacity: 1;
        }

        .image-container {
            position: relative;
            display: inline-block;
        }

        .logo-link {
            pointer-events: none;
        }

        .logo-link.active {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="header-left">
                    <div class="image-container">
                        <a href="https://CWH800729.github.io/index.html" class="logo-link" id="logoLink">
                            <img src="https://CWH800729.github.io/CWH-LOGO" alt="logo" class="logo clickable-image" id="logoImage">
                        </a>
                        <div class="click-count" id="clickCount">0</div>
                    </div>
                    <h1 class="site-title">照片表格製作</h1>
                </div>
                <p class="site-author">系統作者：陳維宏</p>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="title-settings-section">
            <h3 class="title-settings-heading">標題設定</h3>
            <div class="preview-custom-titles">
                <input type="text" class="title-main" placeholder="請輸入主標題" oninput="updatePreviewTitles()">
                <input type="text" class="title-sub" placeholder="請輸入副標題" oninput="updatePreviewTitles()">
                <div class="title-options">
                    <label class="title-checkbox">
                        <input type="checkbox" id="showTitleOnEveryPage" checked>
                        <span>每頁都顯示標題</span>
                    </label>
                </div>
                <div class="print-title">
                    <div class="title-main"></div>
                    <div class="title-sub"></div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="custom-fields">
                <h3>自訂欄位設定</h3>
                <div class="available-fields">
                    <h4>可用的欄位</h4>
                    <div class="field-checkboxes" id="fieldCheckboxes"></div>
                </div>
                <div class="field-config-buttons" style="margin: 10px 0;">
                    <button class="btn btn-secondary" onclick="exportFieldConfig()">
                        <i class="fas fa-save"></i> 匯出欄位設定
                    </button>
                    <button class="btn btn-secondary" onclick="document.getElementById('importConfig').click()">
                        <i class="fas fa-upload"></i> 匯入欄位設定
                        <input type="file" id="importConfig" accept=".json" style="display: none;" onchange="importFieldConfig(this)">
                    </button>
                </div>
                <div class="filename-mapping-config" id="filenameMappingConfig">
                    <label for="filenamePattern" class="has-tooltip" data-tooltip="請依照照片檔名的組成順序填寫，並以 - 分隔。
例如：日期-案名-標題，檔名需為 2023-工程A-外觀.jpg">檔名組成順序：</label>
                    <div class="input-group">
                        <input type="text" id="filenamePattern" placeholder="例如：日期-案名-標題" value="日期-案名-標題" oninput="updatePreviewTable();setPhotoTableColumns();">
                        <button type="button" class="lock-btn unlocked" onclick="toggleFilenamePatternLock(this)" title="點擊鎖定檔名組成順序">
                            <i class="fas fa-lock"></i>
                            <span>鎖定</span>
                        </button>
                    </div>
                    <div class="mapping-note">說明：
                        <br>請依照照片檔名的組成填寫，並以 - 分隔。
                        <br>以「-」分隔，欄位說明與照片檔名組成名稱需一致，否則無法自動帶入欄位。
                        <br>例如：日期-案名-標題，檔名為：2026-工程A-外觀.jpg，則日期=2026，案名=工程A，標題=外觀，並依該規則代入。"</div>
                </div>
                <div id="customFieldsContainer">
                    <!-- 動態欄位將在這裡生成 -->
                </div>
                <button class="add-field-btn" onclick="addCustomField()">
                    <i class="fas fa-plus"></i> 新增自訂欄位
                </button>
            </div>

            <div class="control-panel">
                <div class="column-selector">
                    <label for="columnCount">欄×列：</label>
                    <input type="text" id="columnCount" value="2*3" placeholder="例如：2*3" onchange="setPhotoTableColumns()">
                </div>
                <button class="batch-upload-btn" onclick="document.getElementById('batchUpload').click()">
                    <i class="fas fa-folder-open"></i> 批量匯入照片
                    <input type="file" id="batchUpload" accept="image/*" multiple onchange="handleBatchUpload(this)">
                </button>
                <button type="button" class="btn btn-secondary" onclick="refreshPhotoFieldsFromFilenames()" title="依目前每張照片的檔名與「檔名組成順序」重新填入有勾選「由檔名帶入」的欄位；不需重新選檔">
                    <i class="fas fa-arrows-rotate"></i> 依檔名更新欄位
                </button>
                <button class="btn btn-secondary" onclick="clearAllPhotos()">
                    <i class="fas fa-trash"></i> 清空照片
                </button>
                <button class="btn btn-primary" onclick="printTable()">
                    <i class="fas fa-print"></i> 列印表格
                </button>
                <button type="button" class="btn btn-secondary" onclick="exportPicSheetZip()">
                    <i class="fas fa-file-zipper"></i> 匯出 ZIP
                </button>
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('importPicSheetZip').click()">
                    <i class="fas fa-file-import"></i> 匯入 ZIP
                    <input type="file" id="importPicSheetZip" accept=".zip,application/zip" style="display:none" onchange="handleImportPicSheetZip(this)">
                </button>
            </div>

            <table class="photo-table" id="photoTable">
                <tbody>
                    <tr>
                        <td class="photo-cell" 
                            ondragover="handleDragOver(event)" 
                            ondragleave="handleDragLeave(event)" 
                            ondrop="handleDrop(event)">
                            <input type="file" class="file-input" accept="image/*" onchange="handleImageUpload(this)">
                            <div class="upload-btn">
                                <i class="fas fa-cloud-upload-alt fa-2x"></i>
                                <div>點擊上傳照片</div>
                                <div class="drag-text">或拖曳圖片至此</div>
                            </div>
                            <div class="remove-btn" onclick="removePhoto(this)">
                                <i class="fas fa-times"></i>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="draftFloatPanel" class="draft-float-panel" aria-label="瀏覽器暫存">
        <div class="draft-float-panel-inner">
            <div class="draft-float-title">瀏覽器暫存</div>
            <button type="button" class="btn btn-primary draft-float-btn" onclick="saveDraftNowManual()" title="立即將目前內容寫入瀏覽器儲存空間">
                <i class="fas fa-floppy-disk"></i> 設置暫存
            </button>
            <p class="draft-float-hint">編輯時即會自動暫存；關閉分頁前也會再存一次。若重新整理時選擇不還原暫存，瀏覽器備份會自動刪除。</p>
            <span class="draft-status" id="draftStatus" aria-live="polite"></span>
        </div>
    </div>

    <script>
        // 全域變數保存每張照片的欄位值
        window.photoFieldValues = [];

        const PIACSHEET_DRAFT_KEY = 'PicSheet_html_draft_v1';
        /** 與 initBlankPicSheetPage 預設一致，用於判斷是否為「空白」而不寫暫存 */
        const PIACSHEET_DEFAULT_COLUMN = '2*3';
        const PIACSHEET_DEFAULT_FILENAME_PATTERN = '日期-案名-標題';
        let _picSheetDraftTimer = null;

        function setDraftStatusMessage(msg) {
            const el = document.getElementById('draftStatus');
            if (el) el.textContent = msg || '';
        }

        // 表格操作
        function addRow() {
            setPhotoTableColumns();
        }

        function addColumn() {
            setPhotoTableColumns();
        }

        function reorderPhotoCells() {
            setPhotoTableColumns();
        }

        // 照片上傳處理（對齊「有圖格子」順序，並保留 photoFieldValues）
        function handleImageUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const table = document.getElementById('photoTable');
                    const cells = Array.from(table.querySelectorAll('.photo-cell'));
                    const cell = input.closest('.photo-cell');
                    if (!cell) return;
                    const gridIdx = cells.indexOf(cell);
                    if (gridIdx === -1) return;

                    let photoIdx = 0;
                    for (let i = 0; i < gridIdx; i++) {
                        if (cells[i].querySelector('img')) photoIdx++;
                    }
                    const hadImg = !!cell.querySelector('img');

                    const { images, filenames, allFieldValues } = collectExistingPhotosFromTable();
                    const imgs = images.slice();
                    const fns = filenames.slice();
                    const pfv = allFieldValues.map(o => ({ ...o }));

                    cell.dataset.filename = file.name;
                    if (hadImg) {
                        imgs[photoIdx] = e.target.result;
                        fns[photoIdx] = file.name;
                    } else {
                        imgs.splice(photoIdx, 0, e.target.result);
                        fns.splice(photoIdx, 0, file.name);
                        pfv.splice(photoIdx, 0, {});
                    }
                    renderPhotoTable(imgs, fns, pfv);
                };
                reader.readAsDataURL(file);
            }
        }

        function removePhoto(button) {
            const cell = button.closest('.photo-cell');
            if (!cell) return;
            const table = document.getElementById('photoTable');
            const cells = Array.from(table.querySelectorAll('.photo-cell'));
            const gridIdx = cells.indexOf(cell);
            if (gridIdx === -1) return;

            let photoOrdinal = 0;
            let removeAt = -1;
            for (let i = 0; i < cells.length; i++) {
                if (!cells[i].querySelector('img')) continue;
                if (i === gridIdx) {
                    removeAt = photoOrdinal;
                    break;
                }
                photoOrdinal++;
            }
            if (removeAt === -1) return;

            const { images, filenames, allFieldValues } = collectExistingPhotosFromTable();
            images.splice(removeAt, 1);
            filenames.splice(removeAt, 1);
            allFieldValues.splice(removeAt, 1);
            renderPhotoTable(images, filenames, allFieldValues);
        }

        // 自訂欄位拖曳排序相關函數
        let draggedField = null;

        function handleFieldDragStart(event) {
            draggedField = event.currentTarget;
            event.currentTarget.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
        }

        function handleFieldDragEnd(event) {
            event.currentTarget.classList.remove('dragging');
            draggedField = null;
            showOrHideFilenamePatternConfig();
            updatePreviewTable();
            setPhotoTableColumns();
        }

        function handleFieldDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            
            const container = document.getElementById('customFieldsContainer');
            const afterElement = getDragAfterElement(container, event.clientY);
            const currentField = event.currentTarget;
            
            if (afterElement) {
                container.insertBefore(currentField, afterElement);
            } else {
                container.appendChild(currentField);
            }
        }

        function handleFieldDrop(event) {
            event.preventDefault();
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.custom-field:not(.dragging)')];
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // 新增欄位切換函數
        function toggleField(checkbox, fieldName) {
            const container = document.getElementById('customFieldsContainer');
            const existingField = Array.from(container.querySelectorAll('.custom-field'))
                .find(field => field.querySelector('input[placeholder="欄位名稱"]').value === fieldName);
            if (checkbox.checked) {
                if (!existingField) {
                    const newField = createFieldElement(fieldName);
                    container.appendChild(newField);
                }
            } else {
                if (existingField) {
                    existingField.remove();
                }
            }
            showOrHideFilenamePatternConfig();
            updatePreviewTable();
            setPhotoTableColumns();
        }

        // 創建欄位元素
        function createFieldElement(fieldName) {
            const field = document.createElement('div');
            field.className = 'custom-field';
            field.draggable = true;
            field.ondragstart = handleFieldDragStart;
            field.ondragend = handleFieldDragEnd;
            field.ondragover = handleFieldDragOver;
            field.ondrop = handleFieldDrop;
            field.innerHTML = `
                <i class="fas fa-grip-vertical drag-handle"></i>
                <input type="text" placeholder="欄位名稱" value="${fieldName}" readonly>
                <input type="text" placeholder="欄位值" class="global-value" oninput="updatePreviewTable();setPhotoTableColumns();">
                <label style="font-size:0.95em;margin-left:8px;">
                    <input type="checkbox" class="filename-mapping" onchange="toggleFilenameMapping(this)"> 由檔名帶入
                </label>
                <button onclick="removeField(this)">刪除</button>
            `;
            return field;
        }

        // 修改 removeField 函數
        function removeField(button) {
            const field = button.closest('.custom-field');
            const fieldName = field.querySelector('input[placeholder="欄位名稱"]').value;
            // 取消對應的 checkbox
            const checkbox = document.querySelector(`input[id^="field-"][onchange*="${fieldName}"]`);
            if (checkbox) {
                checkbox.checked = false;
            }
            field.remove();
            showOrHideFilenamePatternConfig();
            updatePreviewTable();
            setPhotoTableColumns();
        }

        // 修改 addCustomField 函數
        function addCustomField() {
            const fieldName = prompt('請輸入新欄位名稱：');
            if (fieldName && fieldName.trim()) {
                const newField = createFieldElement(fieldName.trim());
                document.getElementById('customFieldsContainer').appendChild(newField);
            }
            showOrHideFilenamePatternConfig();
            updatePreviewTable();
            setPhotoTableColumns();
        }

        /** 依儲存格順序收集目前已匯入的照片（略過空格），供批量／拖曳附加新檔時沿用 */
        function collectExistingPhotosFromTable() {
            const table = document.getElementById('photoTable');
            const cells = Array.from(table.querySelectorAll('.photo-cell'));
            const images = [];
            const filenames = [];
            const allFieldValues = [];
            cells.forEach((cell, gridIdx) => {
                const img = cell.querySelector('img');
                if (!img) return;
                images.push(img.src);
                filenames.push(cell.dataset.filename || '');
                const fv = window.photoFieldValues && window.photoFieldValues[gridIdx];
                allFieldValues.push(fv ? { ...fv } : {});
            });
            return { images, filenames, allFieldValues };
        }

        /**
         * 在照片已匯入前提下，依目前「檔名組成順序」與各欄「由檔名帶入」設定，重新解析每格 dataset 檔名並重繪下方欄位（不重選檔）。
         */
        function refreshPhotoFieldsFromFilenames() {
            const hasFilenameMapping = Array.from(document.querySelectorAll('.custom-field')).some(field =>
                field.querySelector('.filename-mapping').checked
            );
            if (!hasFilenameMapping) {
                alert('請先在自訂欄位勾選「由檔名帶入」，或無須依檔名更新。');
                return;
            }
            const isPatternLocked = document.querySelector('.filename-mapping-config .lock-btn').classList.contains('locked');
            if (!isPatternLocked) {
                alert('請先鎖定「檔名組成順序」，再依檔名更新欄位。');
                return;
            }

            const collected = collectExistingPhotosFromTable();
            if (!collected.images.length) {
                alert('目前沒有照片，無法更新欄位。');
                return;
            }

            const pattern = document.getElementById('filenamePattern').value.trim();
            const patternParts = pattern.split('-').map(part => part.trim());
            const customFields = Array.from(document.querySelectorAll('.custom-field')).map(field => ({
                name: field.querySelector('input[placeholder="欄位名稱"]').value,
                value: field.querySelector('.global-value').value,
                filenameMapping: field.querySelector('.filename-mapping').checked
            }));

            const allFieldValues = [];
            const mismatches = [];

            collected.filenames.forEach((fname, i) => {
                const prev = (collected.allFieldValues[i] && typeof collected.allFieldValues[i] === 'object')
                    ? { ...collected.allFieldValues[i] }
                    : {};
                const merged = { ...prev };

                const filenameWithoutExt = (fname || '').split('.').slice(0, -1).join('.');
                const filenameParts = filenameWithoutExt.split('-');

                if (filenameParts.length !== patternParts.length) {
                    if (fname) mismatches.push(fname);
                } else {
                    patternParts.forEach((part, index) => {
                        customFields.forEach(field => {
                            if (field.name === part && field.filenameMapping) {
                                merged[field.name] = filenameParts[index];
                            }
                        });
                    });
                }
                allFieldValues.push(merged);
            });

            if (mismatches.length) {
                const show = mismatches.length <= 6
                    ? mismatches.join('\n')
                    : mismatches.slice(0, 6).join('\n') + '\n…等共 ' + mismatches.length + ' 個檔名';
                alert('以下檔名與「檔名組成順序」段落數不符，該張維持原欄位內容：\n' + show);
            }

            renderPhotoTable(collected.images.slice(), collected.filenames.slice(), allFieldValues);
            updatePreviewTable();
        }

        /** 有任何編輯意義才寫入 localStorage；空白時不存並移除舊鍵 */
        function isPicSheetDraftWorthSaving() {
            const collected = collectExistingPhotosFromTable();
            if (collected.images.length > 0) return true;
            const main = (document.querySelector('.preview-custom-titles input.title-main') || {}).value || '';
            const sub = (document.querySelector('.preview-custom-titles input.title-sub') || {}).value || '';
            if (main.trim() || sub.trim()) return true;
            if (document.querySelectorAll('.custom-field').length > 0) return true;
            const anyFieldChecked = Array.from(document.querySelectorAll('.field-checkbox-item input[type="checkbox"]')).some(cb => cb.checked);
            if (anyFieldChecked) return true;
            const colEl = document.getElementById('columnCount');
            if (colEl && colEl.value.trim() !== PIACSHEET_DEFAULT_COLUMN) return true;
            const fpEl = document.getElementById('filenamePattern');
            if (fpEl && fpEl.value.trim() !== PIACSHEET_DEFAULT_FILENAME_PATTERN) return true;
            if (document.querySelector('.filename-mapping-config .lock-btn') &&
                document.querySelector('.filename-mapping-config .lock-btn').classList.contains('locked')) {
                return true;
            }
            return false;
        }

        function gatherDraftSnapshot() {
            const collected = collectExistingPhotosFromTable();
            const fields = Array.from(document.querySelectorAll('.custom-field')).map(field => {
                const nameInput = field.querySelector('input[placeholder="欄位名稱"]');
                const valueInput = field.querySelector('.global-value');
                return {
                    name: nameInput.value,
                    value: valueInput.value,
                    filenameMapping: field.querySelector('.filename-mapping').checked
                };
            });
            const selectedFields = Array.from(document.querySelectorAll('.field-checkbox-item input[type="checkbox"]'))
                .filter(cb => cb.checked)
                .map(cb => (cb.nextElementSibling && cb.nextElementSibling.textContent) ? cb.nextElementSibling.textContent.trim() : '');
            return {
                version: 1,
                savedAt: new Date().toISOString(),
                columnCount: document.getElementById('columnCount').value,
                filenamePattern: document.getElementById('filenamePattern').value,
                isPatternLocked: document.querySelector('.filename-mapping-config .lock-btn').classList.contains('locked'),
                fields: fields,
                selectedFields: selectedFields,
                mainTitle: document.querySelector('.preview-custom-titles input.title-main').value,
                subTitle: document.querySelector('.preview-custom-titles input.title-sub').value,
                showTitleOnEveryPage: document.getElementById('showTitleOnEveryPage').checked,
                images: collected.images,
                filenames: collected.filenames,
                photoFieldValues: collected.allFieldValues
            };
        }

        function saveDraftToStorage() {
            if (!isPicSheetDraftWorthSaving()) {
                try {
                    localStorage.removeItem(PIACSHEET_DRAFT_KEY);
                } catch (e) { /* ignore */ }
                setDraftStatusMessage('');
                return;
            }
            try {
                const payload = gatherDraftSnapshot();
                localStorage.setItem(PIACSHEET_DRAFT_KEY, JSON.stringify(payload));
                const t = new Date(payload.savedAt);
                setDraftStatusMessage('已暫存於瀏覽器（' + t.toLocaleString('zh-TW') + '）');
            } catch (e) {
                console.error('暫存失敗', e);
                if (e.name === 'QuotaExceededError' || e.code === 22) {
                    setDraftStatusMessage('暫存失敗：照片過多或檔案過大，請匯出欄位設定或減少照片張數');
                } else {
                    setDraftStatusMessage('暫存失敗');
                }
            }
        }

        function scheduleSaveDraft() {
            clearTimeout(_picSheetDraftTimer);
            _picSheetDraftTimer = setTimeout(saveDraftToStorage, 600);
        }

        /** 手動立即寫入暫存（略過防抖） */
        function saveDraftNowManual() {
            clearTimeout(_picSheetDraftTimer);
            saveDraftToStorage();
        }

        /** 空白起始狀態（與初次載入頁面預設一致） */
        function initBlankPicSheetPage(options) {
            const skipScheduleDraft = options && options.skipScheduleDraft;
            document.getElementById('customFieldsContainer').innerHTML = '';
            document.querySelector('.preview-custom-titles input.title-main').value = '';
            document.querySelector('.preview-custom-titles input.title-sub').value = '';

        function picSheetDataURLtoBlob(dataUrl) {
            const i = dataUrl.indexOf(',');
            const head = dataUrl.slice(0, i);
            const b64 = dataUrl.slice(i + 1);
            const mimeM = head.match(/data:([^;]+)/);
            const mime = mimeM ? mimeM[1] : 'image/jpeg';
            const bin = atob(b64);
            const arr = new Uint8Array(bin.length);
            for (let k = 0; k < bin.length; k++) arr[k] = bin.charCodeAt(k);
            return new Blob([arr], { type: mime });
        }

        function picSheetExtFromDataUrl(dataUrl) {
            const m = dataUrl.match(/^data:([^;]+);/);
            const mime = (m && m[1]) ? m[1].toLowerCase() : 'image/jpeg';
            if (mime.includes('png')) return 'png';
            if (mime.includes('gif')) return 'gif';
            if (mime.includes('webp')) return 'webp';
            if (mime.includes('jpeg') || mime.includes('jpg')) return 'jpg';
            return 'jpg';
        }

        function picSheetMimeFromExt(ext) {
            const e = (ext || 'jpg').toLowerCase().replace(/^\./, '');
            if (e === 'png') return 'image/png';
            if (e === 'gif') return 'image/gif';
            if (e === 'webp') return 'image/webp';
            return 'image/jpeg';
        }

        /** 檔名用：移除 Windows／各系統不允許字元 */
        function picSheetSanitizeFilenamePart(s, maxLen) {
            const t = String(s == null ? '' : s)
                .replace(/[\u0000-\u001f<>:"/\\|?*\x7F]/g, '_')
                .replace(/\s+/g, ' ')
                .trim()
                .slice(0, maxLen || 80);
            return t || '';
        }

        /** 依自訂欄位順序（與畫面一致），將各格下方表格的值以「-」串成檔名主干 */
        function picSheetBuildPhotoStemFromFields(fieldValues, fieldNamesInOrder) {
            const parts = fieldNamesInOrder.map(name => {
                const v = fieldValues && fieldValues[name];
                return picSheetSanitizeFilenamePart(v != null && v !== '' ? String(v) : '', 60);
            }).filter(Boolean);
            let stem = parts.join('-');
            stem = stem.replace(/-+/g, '-').replace(/^-|-$/g, '');
            return stem || 'photo';
        }

        /** 匯出 ZIP 檔名：日期時間 + 主標題 + 副標題 */
        function picSheetBuildZipDownloadName() {
            const pad = n => String(n).padStart(2, '0');
            const d = new Date();
            const datePart =
                d.getFullYear()
                + pad(d.getMonth() + 1)
                + pad(d.getDate())
                + '_'
                + pad(d.getHours())
                + pad(d.getMinutes());
            const mainRaw = document.querySelector('.preview-custom-titles input.title-main').value || '';
            const subRaw = document.querySelector('.preview-custom-titles input.title-sub').value || '';
            let main = picSheetSanitizeFilenamePart(mainRaw || '未命名', 40);
            let sub = picSheetSanitizeFilenamePart(subRaw, 40);
            let name = datePart + '_' + main;
            if (sub) name += '_' + sub;
            return name.replace(/_+/g, '_') + '.zip';
        }

        function picSheetDownloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function exportPicSheetZip() {
            if (typeof JSZip === 'undefined') {
                alert('ZIP 元件未載入，請檢查網路後重試');
                return;
            }
            const collected = collectExistingPhotosFromTable();
            if (!collected.images.length) {
                alert('請先匯入至少一張照片再匯出');
                return;
            }
            const fieldNamesInOrder = Array.from(document.querySelectorAll('.custom-field')).map(field =>
                (field.querySelector('input[placeholder="欄位名稱"]') || {}).value || ''
            ).filter(Boolean);
            const fieldsMeta = Array.from(document.querySelectorAll('.custom-field')).map(field => ({
                name: field.querySelector('input[placeholder="欄位名稱"]').value,
                value: field.querySelector('.global-value').value,
                filenameMapping: field.querySelector('.filename-mapping').checked
            }));
            const selectedFieldsMeta = Array.from(document.querySelectorAll('.field-checkbox-item input[type="checkbox"]'))
                .filter(cb => cb.checked)
                .map(cb => (cb.nextElementSibling && cb.nextElementSibling.textContent)
                    ? cb.nextElementSibling.textContent.trim() : '');
            const manifest = {
                format: 'PicSheetZip',
                version: 1,
                exportedAt: new Date().toISOString(),
                columnCount: document.getElementById('columnCount').value,
                mainTitle: document.querySelector('.preview-custom-titles input.title-main').value,
                subTitle: document.querySelector('.preview-custom-titles input.title-sub').value,
                showTitleOnEveryPage: document.getElementById('showTitleOnEveryPage').checked,
                filenamePattern: document.getElementById('filenamePattern').value,
                isPatternLocked: document.querySelector('.filename-mapping-config .lock-btn').classList.contains('locked'),
                fields: fieldsMeta,
                selectedFields: selectedFieldsMeta,
                photoFieldValues: collected.allFieldValues.map(fv => ({ ...fv })),
                zipImagePaths: []
            };

            const zip = new JSZip();
            const imgFolder = zip.folder('images');
            const used = new Set();

            for (let i = 0; i < collected.images.length; i++) {
                const fv = collected.allFieldValues[i] || {};
                let stem = picSheetBuildPhotoStemFromFields(fv, fieldNamesInOrder);
                stem = picSheetSanitizeFilenamePart(stem, 100) || 'photo';
                const n = String(i + 1).padStart(4, '0');
                const ext = picSheetExtFromDataUrl(collected.images[i]);
                let base = n + '-' + stem + '.' + ext;
                let dup = 2;
                while (used.has(base)) {
                    base = n + '-' + stem + '_' + dup + '.' + ext;
                    dup++;
                }
                used.add(base);
                const path = 'images/' + base;
                manifest.zipImagePaths.push(path);
                imgFolder.file(base, picSheetDataURLtoBlob(collected.images[i]));
            }

            zip.file('PicSheet-manifest.json', JSON.stringify(manifest, null, 2));
            try {
                const out = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
                picSheetDownloadBlob(out, picSheetBuildZipDownloadName());
            } catch (e) {
                console.error(e);
                alert('匯出失敗：' + (e.message || e));
            }
        }

        async function handleImportPicSheetZip(input) {
            const file = input.files && input.files[0];
            input.value = '';
            if (!file) return;
            if (typeof JSZip === 'undefined') {
                alert('ZIP 元件未載入，請檢查網路後重試');
                return;
            }
            try {
                const zip = await JSZip.loadAsync(file);
                const mf = zip.file('PicSheet-manifest.json');
                if (!mf) {
                    alert('無效的檔案：缺少 PicSheet-manifest.json');
                    return;
                }
                const text = await mf.async('string');
                const manifest = JSON.parse(text);
                if (manifest.format !== 'PicSheetZip' || manifest.version !== 1) {
                    alert('無法匯入：不是本系統的 PicSheet ZIP（版本不相容）');
                    return;
                }

                const paths = Array.isArray(manifest.zipImagePaths) && manifest.zipImagePaths.length
                    ? manifest.zipImagePaths
                    : Object.keys(zip.files)
                        .filter(p => {
                            const f = zip.files[p];
                            return f && !f.dir && /^images\//i.test(p) && !/\.json$/i.test(p);
                        })
                        .sort();

                if (!paths.length) {
                    alert('ZIP 內沒有照片檔');
                    return;
                }

                const images = [];
                const filenames = [];
                const fileToDataURL = (blob) =>
                    new Promise((resolve, reject) => {
                        const r = new FileReader();
                        r.onload = () => resolve(r.result);
                        r.onerror = () => reject(r.error);
                        r.readAsDataURL(blob);
                    });
                for (const rel of paths) {
                    const zf = zip.file(rel.replace(/^\//, ''));
                    if (!zf || zf.dir) continue;
                    const u8 = await zf.async('uint8array');
                    const base = rel.split('/').pop() || 'image.jpg';
                    const ext = (base.split('.').pop() || 'jpg').toLowerCase();
                    const mime = picSheetMimeFromExt(ext);
                    const blob = new Blob([u8], { type: mime });
                    images.push(await fileToDataURL(blob));
                    filenames.push(base);
                }

                if (!images.length) {
                    alert('無法讀取 ZIP 內的影像檔');
                    return;
                }

                applyFieldConfigFromObject(manifest);
                document.getElementById('columnCount').value =
                    (manifest.columnCount != null && manifest.columnCount !== '') ? manifest.columnCount : '2*3';
                const pfv = Array.isArray(manifest.photoFieldValues)
                    ? manifest.photoFieldValues.map(o =>
                        (o && typeof o === 'object') ? { ...o } : {})
                    : [];

                while (pfv.length < images.length) pfv.push({});
                if (pfv.length > images.length) pfv.length = images.length;

                renderPhotoTable(images, filenames, pfv);
                updatePreviewTable();
                scheduleSaveDraft();
                alert('匯入完成（共 ' + images.length + ' 張）');
            } catch (e) {
                console.error(e);
                alert('匯入失敗：' + (e.message || e));
            }
        }

        // 批量上傳處理
        function handleBatchUpload(input) {
            const files = Array.from(input.files);
            if (files.length === 0) return;

            console.log('開始批量上傳處理...');

            // 獲取檔名組成順序
            const patternInput = document.getElementById('filenamePattern');
            const isPatternLocked = document.querySelector('.filename-mapping-config .lock-btn').classList.contains('locked');
            console.log('檔名組成順序狀態:', {
                pattern: patternInput.value,
                isLocked: isPatternLocked
            });

            // 檢查是否有任何欄位勾選了"由檔名代入"
            const hasFilenameMapping = Array.from(document.querySelectorAll('.custom-field')).some(field => 
                field.querySelector('.filename-mapping').checked
            );

            // 只有在有欄位勾選"由檔名代入"時才檢查鎖定狀態
            if (hasFilenameMapping && !isPatternLocked) {
                alert('請先確認並鎖定檔名組成順序！');
                input.value = '';
                return;
            }

            const pattern = patternInput.value.trim();
            const patternParts = pattern.split('-').map(part => part.trim());
            console.log('解析後的檔名組成順序:', patternParts);
            
            // 獲取自訂欄位設定
            const customFields = Array.from(document.querySelectorAll('.custom-field')).map(field => ({
                name: field.querySelector('input[placeholder="欄位名稱"]').value,
                value: field.querySelector('.global-value').value,
                filenameMapping: field.querySelector('.filename-mapping').checked
            }));
            console.log('自訂欄位設定:', customFields);

            let { images, filenames, allFieldValues } = collectExistingPhotosFromTable();
            let loaded = 0;
            const formatMismatchNames = [];

            function finishBatchUploadIfDone() {
                if (loaded !== files.length) return;
                if (formatMismatchNames.length) {
                    const n = formatMismatchNames.length;
                    const sample = formatMismatchNames.slice(0, 5).join('、');
                    const tail = n > 5 ? `…（僅列出前 5 個，共 ${n} 張）` : '';
                    alert(
                        `有 ${n} 張照片的檔名與「檔名組成順序」不符（預期 ${patternParts.length} 段，以「-」分隔；格式：${pattern}）。\n` +
                        `已仍匯入照片；該批「由檔名帶入」欄位為空，請手動填寫，或修正檔名後按「依檔名更新欄位」。\n\n` +
                        `檔名範例：${sample}${tail}`
                    );
                }
                console.log('所有檔案處理完成，開始渲染表格');
                window.photoFieldValues = allFieldValues;
                renderPhotoTable(images, filenames, allFieldValues);
            }

            files.forEach((file, i) => {
                console.log(`處理檔案 ${i + 1}/${files.length}:`, file.name);
                const reader = new FileReader();
                reader.onload = function(e) {
                    const filenameWithoutExt = file.name.split('.').slice(0, -1).join('.');
                    const filenameParts = filenameWithoutExt.split('-');
                    console.log('解析後的檔名:', {
                        original: file.name,
                        withoutExt: filenameWithoutExt,
                        parts: filenameParts
                    });

                    if (hasFilenameMapping && filenameParts.length !== patternParts.length) {
                        console.warn('檔名格式不符合（仍匯入）:', {
                            expected: patternParts,
                            actual: filenameParts,
                            file: file.name
                        });
                        formatMismatchNames.push(file.name);
                        images.push(e.target.result);
                        filenames.push(file.name);
                        allFieldValues.push({});
                        loaded++;
                        finishBatchUploadIfDone();
                        return;
                    }

                    const fieldValues = {};
                    if (hasFilenameMapping) {
                        patternParts.forEach((part, index) => {
                            customFields.forEach(field => {
                                if (field.name === part && field.filenameMapping) {
                                    fieldValues[field.name] = filenameParts[index];
                                    console.log(`欄位對應: ${field.name} = ${filenameParts[index]}`);
                                }
                            });
                        });
                    }
                    console.log('當前檔案的欄位值映射:', fieldValues);

                    images.push(e.target.result);
                    filenames.push(file.name);
                    allFieldValues.push(fieldValues);
                    loaded++;

                    finishBatchUploadIfDone();
                };
                reader.readAsDataURL(file);
            });
            input.value = '';
        }

        // 列印表格
        function printTable() {
            // 創建列印用的內容容器
            const printContainer = document.createElement('div');
            printContainer.className = 'print-content';
            
            // 獲取標題內容和設定
            const mainTitle = document.querySelector('.preview-custom-titles input.title-main').value;
            const subTitle = document.querySelector('.preview-custom-titles input.title-sub').value;
            const showTitleOnEveryPage = document.getElementById('showTitleOnEveryPage').checked;
            let hasTitles = false;
            
            // 獲取所有照片單元格
            const cells = document.querySelectorAll('.photo-cell');
            const cellsWithImages = Array.from(cells).filter(cell => cell.querySelector('img'));
            
            if (!cellsWithImages.length) {
                alert('沒有可列印的照片');
                return;
            }
            
            // 列印：依「欄×列」輸入（與預覽相同 parseColumnRowFormat），每頁欄數×列數張圖
            const columnRowFormat = document.getElementById('columnCount').value;
            const { columns: columnCount, rows: rowCount } = parseColumnRowFormat(columnRowFormat);
            const cellsPerPage = columnCount * rowCount;
            const totalPages = Math.ceil(cellsWithImages.length / cellsPerPage);
            
            // 計算A4紙張可用尺寸 (A4: 297mm 高；@page margin 1cm 與下列一致)
            const pageHeightMM = 297;
            const marginLRMM = 20; // 左右各 1cm，共 20mm（與 @page margin 對齊）
            const marginTBMM = 20; // 上下各 1cm
            const gapMM = 10; // 欄／列間距 10mm（與 CSS gap:10mm 一致）
            
            // 計算標題高度（如果有標題且要在每頁顯示，或只在第一頁顯示）
            const titleHeightMM = (mainTitle || subTitle) ? 35 : 0; // 主標題+副標題+間距約35mm
            
            // 可列印高度（寬度由下列 flex + gap 與 @page 左右各 1cm 對齊）
            const usableHeightMM = pageHeightMM - marginTBMM - titleHeightMM - (gapMM * (rowCount - 1));
            
            // 每格高度；每格寬度 = (100% − (欄數−1)×gap) / 欄數
            const cellHeightMM = usableHeightMM / rowCount;
            const cellWidthCalc =
                columnCount <= 1
                    ? '100%'
                    : `calc((100% - ${(columnCount - 1) * gapMM}mm) / ${columnCount})`;
            
            // 為每頁創建內容
            for (let page = 0; page < totalPages; page++) {
                // 決定是否在當前頁面顯示標題
                const shouldShowTitle = (mainTitle || subTitle) && (showTitleOnEveryPage || page === 0);
                
                if (shouldShowTitle) {
                    hasTitles = true;
                    const titlesDiv = document.createElement('div');
                    titlesDiv.className = 'preview-custom-titles';
                    titlesDiv.innerHTML = `
                        <div class="print-title">
                            ${mainTitle ? `<div class="title-main">${mainTitle}</div>` : ''}
                            ${subTitle ? `<div class="title-sub">${subTitle}</div>` : ''}
                        </div>
                    `;
                    printContainer.appendChild(titlesDiv);
                }
                
                const pageStart = page * cellsPerPage;
                const pageCells = cellsWithImages.slice(pageStart, pageStart + cellsPerPage);
                
                // 如果這頁的單元格少於cellsPerPage個，添加空白單元格
                while (pageCells.length < cellsPerPage) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'print-placeholder';
                    pageCells.push(emptyCell);
                }
                
                // 建立每頁的容器
                const pageDiv = document.createElement('div');
                pageDiv.className = 'print-page';
                // 使用flexbox佈局，讓格子能自動換行
                pageDiv.style.display = 'flex';
                pageDiv.style.flexWrap = 'wrap';
                pageDiv.style.gap = `${gapMM}mm`;
                pageDiv.style.width = '100%';
                pageDiv.style.maxWidth = '100%';
                pageDiv.style.boxSizing = 'border-box';
                pageDiv.style.justifyContent = 'flex-start';
                
                // 處理這頁的每個單元格（寬度由欄數與 gap 計算，見 cellWidthCalc）
                pageCells.forEach((cell, index) => {
                    const printCell = document.createElement('div');
                    printCell.className = 'print-photo-cell';
                    printCell.style.height = `${cellHeightMM}mm`;
                    printCell.style.overflow = 'hidden';
                    printCell.style.flex = `1 1 ${cellWidthCalc}`;
                    printCell.style.maxWidth = cellWidthCalc;
                    
                    if (cell.querySelector && cell.querySelector('img')) {
                        // 複製欄位區塊（如有）
                        let fieldsDiv = null;
                        let fieldsHeightPx = 0;
                        if (cell.querySelector('.photo-cell-fields')) {
                            fieldsDiv = document.createElement('div');
                            fieldsDiv.className = 'print-photo-fields';
                            // 複製每個欄位
                            const fieldRows = cell.querySelectorAll('.photo-cell-field-row');
                            fieldRows.forEach(row => {
                                const printRow = document.createElement('div');
                                printRow.className = 'print-field-row';
                                const label = row.querySelector('.photo-cell-field-label');
                                const valueInput = row.querySelector('input.photo-cell-field-value');
                                const value = valueInput ? valueInput.value : '';
                                if (label) {
                                    const printLabel = document.createElement('div');
                                    printLabel.className = 'print-field-label';
                                    printLabel.textContent = label.textContent;
                                    const printValue = document.createElement('div');
                                    printValue.className = 'print-field-value';
                                    printValue.textContent = value;
                                    printRow.appendChild(printLabel);
                                    printRow.appendChild(printValue);
                                    fieldsDiv.appendChild(printRow);
                                }
                            });
                            // 先加到cell以便計算高度
                            printCell.appendChild(fieldsDiv);
                            // 計算欄位區塊高度
                            fieldsHeightPx = fieldsDiv.offsetHeight || 40; // 若無法取得則預設40px
                        }
                        
                        // 複製圖片
                        const printImg = document.createElement('img');
                        printImg.src = cell.querySelector('img').src;
                        printImg.style.width = '100%';
                        printImg.style.objectFit = 'contain';
                        printImg.style.display = 'block';
                        
                        // 圖片高度 = cellHeightMM - 欄位區塊高度 (mm)
                        // 1mm ≈ 3.78px
                        let imgHeightMM = cellHeightMM;
                        if (fieldsDiv) {
                            imgHeightMM = cellHeightMM - (fieldsHeightPx / 3.78);
                            if (imgHeightMM < 10) imgHeightMM = 10; // 最小10mm
                        }
                        printImg.style.height = `${imgHeightMM}mm`;
                        printCell.insertBefore(printImg, fieldsDiv || null);
                    }
                    pageDiv.appendChild(printCell);
                });
                printContainer.appendChild(pageDiv);
            }
            
            // 將列印內容添加到 body
            document.body.appendChild(printContainer);
            
            // 執行列印
            window.print();
            
            // 列印完成後移除列印內容
            document.body.removeChild(printContainer);
        }
